<!DOCTYPE html>
<html>
<head>
<title>Euler Method</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#2f5e53,#8bd3a6);
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

h1{color:white;margin-top:60px;}

.card{
background:white;
padding:40px;
width:650px;
border-radius:12px;
margin-top:40px;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:120px;
}

button{
padding:10px 20px;
background:#1f4b3e;
color:white;
border:none;
border-radius:8px;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Euler Method</h1>

<div class="card">

dy/dx = <input id="func" placeholder="x+y"><br>

x0 <input id="x0">
y0 <input id="y0"><br>

step h <input id="h">
xn <input id="xn"><br>

<button onclick="solve()">Solve</button>

<div class="result" id="res"></div>

</div>

<script>

function f(x,y){
let func=document.getElementById("func").value
return eval(func)
}

function solve(){

let x=parseFloat(document.getElementById("x0").value)
let y=parseFloat(document.getElementById("y0").value)
let h=parseFloat(document.getElementById("h").value)
let xn=parseFloat(document.getElementById("xn").value)

while(x<xn){
y=y+h*f(x,y)
x=x+h
}

document.getElementById("res").innerHTML="y("+xn+") = "+y

}

</script>

</body>
</html>
