<!DOCTYPE html>
<html>
<head>
<title>F Test</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#2f5e53,#8bd3a6);
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

h1{
color:white;
margin-top:60px;
font-size:40px;
}

.card{
background:white;
padding:40px;
width:650px;
border-radius:12px;
margin-top:40px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
padding:10px;
margin:10px;
width:150px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#1f4b3e;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>F Test</h1>

<div class="card">

Variance 1 <input id="v1"><br>

Variance 2 <input id="v2"><br>

<button onclick="solve()">Calculate</button>

<div class="result" id="res"></div>

</div>

<script>

function solve(){

let v1=parseFloat(document.getElementById("v1").value)
let v2=parseFloat(document.getElementById("v2").value)

let f=v1/v2

document.getElementById("res").innerHTML="F Value = "+f

}

</script>

</body>
</html>
