<!DOCTYPE html>
<html>
<head>
<title>Power Method</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#2f5e53,#8bd3a6);
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

h1{
color:white;
margin-top:60px;
}

.card{
background:white;
padding:40px;
width:650px;
border-radius:12px;
margin-top:40px;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:#1f4b3e;
color:white;
border:none;
border-radius:8px;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Power Method</h1>

<div class="card">

Matrix (example: 2 1,1 2)<br>
<input id="matrix"><br>

Vector (example: 1,1)<br>
<input id="vector"><br>

<button onclick="solve()">Solve</button>

<div class="result" id="res"></div>

</div>

<script>

function solve(){

let rows=document.getElementById("matrix").value.split(",")
let A=rows.map(r=>r.trim().split(" ").map(Number))

let x=document.getElementById("vector").value.split(",").map(Number)

let n=A.length
let max=0

for(let k=0;k<10;k++){

let y=new Array(n).fill(0)

for(let i=0;i<n;i++)
for(let j=0;j<n;j++)
y[i]+=A[i][j]*x[j]

max=Math.max(...y.map(Math.abs))

for(let i=0;i<n;i++)
x[i]=y[i]/max

}

document.getElementById("res").innerHTML="Largest Eigenvalue ≈ "+max

}

</script>

</body>
</html>
