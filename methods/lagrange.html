<!DOCTYPE html>
<html>
<head>
<title>Lagrange Interpolation</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#2f5e53,#8bd3a6);
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

h1{color:white;margin-top:60px;}

.card{
background:white;
padding:40px;
width:650px;
border-radius:12px;
margin-top:40px;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:#1f4b3e;
color:white;
border:none;
border-radius:8px;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Lagrange Interpolation</h1>

<div class="card">

x values <input id="xvals" placeholder="1,2,3"><br>

y values <input id="yvals" placeholder="2,3,5"><br>

x <input id="x"><br>

<button onclick="solve()">Solve</button>

<div class="result" id="res"></div>

</div>

<script>

function solve(){

let xvals=document.getElementById("xvals").value.split(",").map(Number)
let yvals=document.getElementById("yvals").value.split(",").map(Number)

let x=parseFloat(document.getElementById("x").value)

let n=xvals.length
let result=0

for(let i=0;i<n;i++){

let term=yvals[i]

for(let j=0;j<n;j++){

if(j!=i)
term*= (x-xvals[j])/(xvals[i]-xvals[j])

}

result+=term

}

document.getElementById("res").innerHTML="Result = "+result

}

</script>

</body>
</html>
